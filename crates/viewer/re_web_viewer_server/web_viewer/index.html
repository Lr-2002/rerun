<!doctype html>
<!-- Delta SDK-bundled web viewer. -->
<html>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

  <!-- Disable zooming: -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <head>
    <link rel="icon" href="favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;500&display=swap"
      rel="stylesheet"
    />
    <title>Delta Viewer</title>
    <style>
      html {
        /* Remove touch delay: */
        touch-action: manipulation;
      }

      body {
        background: #0d1011;
      }

      /* Allow canvas to fill entire web page: */
      html,
      body {
        overflow: hidden;
        margin: 0 !important;
        padding: 0 !important;
        height: 100%;
        width: 100%;
      }

      /* Position canvas in center-top: */
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      /* Match the Delta header bar. */
      .header {
        width: 100%;
        height: 44px;
        /* background: #111415; */
        /* Actual value from Delta Viewer */
        background: #141414;
      }

      /* Create a container filling the remaining space. */
      .container {
        position: absolute;
        height: calc(100vh - 44px);
        width: 100vw;
      }

      /* Centered div inside the container. */
      .centered {
        margin-right: auto;
        margin-left: auto;
        display: block;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }

      /* Delta styling for normal text. */
      p {
        /*Gray-775*/
        color: #cad8de;
        letter-spacing: -0.15px;
        font-family: "Inter", sans-serif;
        font-weight: 500;
      }

      /* Delta styling for strong text. Matches `TextStyle::Heading`. */
      .strong {
        /*Gray-775*/
        color: #ffffff;
        /* Match current rerun header value */
        font-size: 16px;
      }

      /* Delta styling for subdued text.*/
      .subdued {
        /*Gray-550*/
        color: #7d8c92;
        /* Larger subdued size to match current rerun font */
        font-size: 12px;
        letter-spacing: -0.12px;
      }

      pre {
        /*Gray-550*/
        color: #7d8c92;
        font-size: 10px;
        letter-spacing: -0.12px;
      }

      a .button {
        display: inline-block;
        background: white;
        color: black;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 500;
      }

      /* Transition to hidden */
      .hidden {
        opacity: 0;
        transition: opacity 0.2s ease-out;
        visibility: hidden;
      }

      /* Transition to visible */
      .visible {
        opacity: 100;
        transition: opacity 0.2s ease-in;
        visibility: visible;
      }
    </style>
  </head>

  <body>
    <div class="header"></div>
    <div class="container">
      <div class="centered hidden" id="center_text"></div>
    </div>
    <!-- The Wasm code will resize the canvas dynamically -->
    <canvas id="the_canvas_id" class="hidden"></canvas>

    <script>
      // The `--no-modules`-generated JS from `wasm-bindgen` attempts to use
      // `WebAssembly.instantiateStreaming` to instantiate the wasm module,
      // but this doesn't work with `file://` urls. This example is frequently
      // viewed by simply opening `index.html` in a browser (with a `file://`
      // url), so it would fail if we were to call this function!
      //
      // Work around this for now by deleting the function to ensure that the
      // `no_modules.js` script doesn't have access to it. You won't need this
      // hack when deploying over HTTP.
      delete WebAssembly.instantiateStreaming;
    </script>

    <!-- this is the JS generated by the `wasm-bindgen` CLI tool -->
    <script src="re_viewer.js"></script>

    <script>
      if (window.location.hostname == "app.rerun.io") {
        const script = document.createElement("script");
        script.src = "https://fifteen-thirtyeight.rerun.io/script.js";
        script.dataset.site = "QKMCQFTQ";
        script.defer = true;
        document.body.appendChild(script);
      }

      function show_center_html(html) {
        center_text_elem = document.getElementById("center_text");
        center_text_elem.innerHTML = html;
        center_text_elem.classList.remove("hidden");
        center_text_elem.classList.add("visible");
      }
      function hide_center_html(html) {
        center_text_elem = document.getElementById("center_text");
        center_text_elem.innerHTML = html;
        center_text_elem.classList.remove("visible");
        center_text_elem.classList.add("hidden");
      }
      function show_canvas(html) {
        canvas_elem = document.getElementById("the_canvas_id");
        canvas_elem.classList.remove("hidden");
        canvas_elem.classList.add("visible");
      }
      function hide_canvas(html) {
        canvas_elem = document.getElementById("the_canvas_id");
        canvas_elem.classList.remove("visible");
        canvas_elem.classList.add("hidden");
      }

      // Feature-detect Wasm SIMD (`simd128`). The viewer .wasm is compiled with
      // `-Ctarget-feature=+simd128`, so browsers without SIMD support will fail to
      // instantiate the module with a cryptic error. We detect up-front and surface
      // a friendly message instead.
      //
      // The probe is a tiny module that uses the `v128.any_true` instruction.
      // Supported in: Chrome 91+, Firefox 89+, Safari 16.4+.
      function has_wasm_simd() {
        try {
          return WebAssembly.validate(
            new Uint8Array([
              0, 97, 115, 109, 1, 0, 0, 0, 1, 5, 1, 96, 0, 1, 123, 3, 2, 1, 0,
              10, 10, 1, 8, 0, 65, 0, 253, 15, 253, 98, 11,
            ]),
          );
        } catch (e) {
          return false;
        }
      }

      function show_unsupported_browser() {
        show_center_html(`
          <p class="strong">
              Your browser is too old to run the Delta Viewer.
          </p>
          <p>
              The Viewer requires WebAssembly SIMD support, available in:
          </p>
          <p>
              Chrome 91+, Firefox 89+, Safari 16.4+, or any modern Chromium-based browser.
          </p>
          <p>
              Please update your browser and try again.
          </p>
        `);
      }

      // On mobile platforms show a warning, but provide a link to try anyways
      if (
        /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
          navigator.userAgent,
        )
      ) {
        show_center_html(`
          <p>
              Delta is not yet supported on mobile browsers.
          </p>
          <p>
              <a class="button" href="#" id="try_anyways">Try anyways</a>
          </p>
        `);
        document
          .querySelector("#try_anyways")
          .addEventListener("click", function (event) {
            event.preventDefault();
            if (!has_wasm_simd()) {
              show_unsupported_browser();
              return;
            }
            load_wasm();
          });
      } else if (!has_wasm_simd()) {
        show_unsupported_browser();
      } else {
        load_wasm();
      }

      var urlWebGl = new URL(window.location);
      urlWebGl.searchParams.set("renderer", "webgl");

      var urlWebGpu = new URL(window.location);
      urlWebGpu.searchParams.set("renderer", "webgpu");

      const forceWgpuBackendInfoParagraph = `
        <p>
            For graphics related issues, try forcing to render with WebGL<br>
            <a href="${urlWebGl}">${urlWebGl}</a><br>
            or with WebGPU<br>
            <a href="${urlWebGpu}">${urlWebGpu}</a>
        </p>`;

      function load_wasm() {
        // We'll defer our execution until the wasm is ready to go.
        // Here we tell bindgen the path to the wasm file so it can start
        // initialization and return to us a promise when it's done.

        console.debug("loading wasm…");

        document.getElementById("center_text").innerHTML = `
                <p class="strong">
                    Loading Application Bundle…
                </p>
                <p class="subdued" id="status">
                </p>`;

        const status_element = document.getElementById("status");
        function progress({ loaded, total_bytes }) {
          if (total_bytes != null && total_bytes > 0) {
            status_element.innerHTML =
              Math.round(Math.min((loaded / total_bytes) * 100, 100)) + "%";
          } else {
            status_element.innerHTML =
              (loaded / (1024 * 1024)).toFixed(1) + "MiB";
          }
        }

        var timeoutId = setTimeout(function () {
          document.getElementById("center_text").classList.remove("hidden");
          document.getElementById("center_text").classList.add("visible");
        }, 1500);

        async function wasm_with_progress() {
          const response = await fetch("./re_viewer_bg.wasm");
          // Use the uncompressed size
          var content_length;
          var content_multiplier = 1;
          // If our custom size header is set, use that (see `re_web_viewer_server` crate)
          var custom_size_header = response.headers.get("rerun-final-length");
          if (custom_size_header != null) {
            content_length = custom_size_header;
          } else if (response.headers.get("content-encoding") == "gzip") {
            // If the content is gzip encoded, try to get the uncompressed size.
            content_length = response.headers.get(
              "x-goog-meta-uncompressed-size",
            );

            // If the uncompressed size wasn't found 3 seems to be a very good approximation
            if (content_length == null) {
              content_length = response.headers.get("content-length");
              content_multiplier = 3;
            }
          } else {
            content_length = response.headers.get("content-length");
          }

          const total_bytes = parseInt(content_length, 10) * content_multiplier;
          let loaded = 0;

          const res = new Response(
            new ReadableStream({
              async start(controller) {
                const reader = response.body.getReader();
                for (;;) {
                  const { done, value } = await reader.read();
                  if (done) break;
                  loaded += value.byteLength;
                  progress({ loaded, total_bytes });
                  controller.enqueue(value);
                }
                controller.close();
              },
            }),
            {
              status: response.status,
              statusText: response.statusText,
            },
          );

          for (const [key, value] of response.headers.entries()) {
            res.headers.set(key, value);
          }

          wasm_bindgen(res)
            .then(() => (clearTimeout(timeoutId), on_wasm_loaded()))
            .catch(on_wasm_error);
        }

        wasm_with_progress();
      }

      async function on_wasm_loaded() {
        window.set_email = (value) => wasm_bindgen.set_email(value);

        console.debug("Wasm loaded. Starting app…");

        const query = new URLSearchParams(window.location.search);
        const active_route = route_for_path(window.location.pathname);
        const query_urls = query.getAll("url");
        const route_default_urls =
          query_urls.length > 0 || active_route == null
            ? []
            : await source_urls_for_route(active_route, query);
        const source_urls =
          query_urls.length > 0 ? query_urls : route_default_urls;

        /*
          url: Option<StringOrStringArray>,
          manifest_url: Option<String>,
          render_backend: Option<String>,
          video_decoder: Option<String>,
          hide_welcome_screen: Option<bool>,
          panel_state_overrides: Option<PanelStateOverrides>,
          fullscreen: Option<FullscreenOptions>,
          enable_history: Option<bool>,
          notebook: Option<bool>,
          persist: Option<bool>,
          theme: Option<String>,
        */
        const options = {
          url: source_urls,
          manifest_url: query.get("manifest_url"),
          render_backend: query.get("renderer"),
          video_decoder: query.get("video_decoder"),
          hide_welcome_screen:
            query.has("hide_welcome_screen") || route_default_urls.length > 0,
          // panel_state_overrides: undefined,
          // fullscreen: undefined,
          enable_history: active_route == null,
          notebook: get_query_bool(query, "notebook", false),
          persist: get_query_bool(query, "persist", true),
          fallback_token: query.get("token"),
          theme: query.get("theme"),
          login: {
            signed_in_url: location.origin + "/signed-in",
            signed_out_url: location.origin + "/signed-out",
          },
        };

        let handle = new wasm_bindgen.WebHandle(options);

        function check_for_panic() {
          if (handle.has_panicked()) {
            console.error("Delta has crashed");

            document.getElementById("the_canvas_id").remove();

            show_center_html(`
              <p class="strong">
                  Delta has crashed.
              </p>
              <pre align="left">${handle.panic_message()}</pre>
              <p>
                  See the console for details.
              </p>
              <p>
                  Reload the page to try again.<br>
                  Please consider filing a <a href=https://github.com/rerun-io/rerun/issues/new/>bug report<a>. Thank you!
              </p>
              ${forceWgpuBackendInfoParagraph}
            `);
          } else {
            let delay_ms = 1000;
            setTimeout(check_for_panic, delay_ms);
          }
        }

        check_for_panic();

        handle
          .start(document.getElementById("the_canvas_id"))
          .then(on_app_started)
          .catch(on_wasm_error);
      }

      function get_query_bool(
        /** @type {URLSearchParams} */ query,
        /** @type {string} */ key,
        /** @type {boolean} */ fallback,
      ) {
        const values = query.getAll(key);
        if (values.length !== 1) {
          console.warn(
            `found ${values.length} values for "${key}" query. Expected one or none. Defaulting to "${fallback}".`,
          );
          return fallback;
        }

        // prettier-ignore
        switch (values[0]) {
          case "0": /* fallthrough */
          case "false": return false;

          case "": /* fallthrough */
          case "1": /* fallthrough */
          case "true": return true;

          default:
            console.warn(`unexpected value for "${key}" query. Expected one of: 0, 1, false, true, or no value. Defaulting to "${fallback}".`);
            return fallback;
        }
      }

      async function source_urls_for_route(route, query) {
        const backend_base_url = dohc_backend_base_url(query);
        const session_urls = await fetch_dohc_default_session_urls(
          backend_base_url,
          route,
          query.get("session"),
        );
        if (session_urls.length > 0) {
          return session_urls;
        }

        return dohc_fallback_source_urls(backend_base_url, route);
      }

      function route_for_path(pathname) {
        switch (pathname) {
          case "/demo":
            return "demo";
          case "/analyze":
            return "analyze";
          case "/dashboard":
            return "demo";
          default:
            return null;
        }
      }

      function dohc_backend_base_url(query) {
        const configured = query.get("backend");
        if (configured != null && configured !== "") {
          const backend_base_url = configured.replace(/\/$/, "");
          remember_dohc_backend_base_url(backend_base_url);
          return backend_base_url;
        }

        const backend_port = query.get("backend_port") || "8000";
        const hostname = window.location.hostname || "127.0.0.1";
        const backend_base_url = `${window.location.protocol}//${hostname}:${backend_port}`;
        remember_dohc_backend_base_url(backend_base_url);
        return backend_base_url;
      }

      function remember_dohc_backend_base_url(backend_base_url) {
        try {
          window.sessionStorage.setItem(
            "dohc_backend_base_url",
            backend_base_url,
          );
        } catch (_error) {
          // Session storage is optional; the viewer still falls back to URL-derived state.
        }
      }

      async function fetch_dohc_default_session_urls(
        backend_base_url,
        route,
        selected_session_id,
      ) {
        const api_urls = [
          new URL("/sources", backend_base_url),
          new URL("/api/playback/sessions", backend_base_url),
        ];

        for (const api_url of api_urls) {
          api_url.searchParams.set("route", route);
          const source_urls = await fetch_dohc_session_urls(
            api_url,
            backend_base_url,
            route,
            selected_session_id,
          );
          if (source_urls.length > 0) {
            return source_urls;
          }
        }

        return [];
      }

      async function fetch_dohc_session_urls(
        api_url,
        backend_base_url,
        route,
        selected_session_id,
      ) {
        try {
          const response = await fetch(api_url);
          if (!response.ok) {
            console.warn(
              `Failed to fetch DOHC sessions: ${response.status} ${response.statusText}`,
            );
            return [];
          }

          const payload = await response.json();
          const sessions = Array.isArray(payload.sessions)
            ? payload.sessions
            : Array.isArray(payload.sources)
              ? payload.sources
            : [];
          const target_session_id =
            selected_session_id ||
            payload.default_session_id ||
            payload.default_source_id;
          const session =
            sessions.find((session) => session.id === target_session_id) ||
            sessions[0];
          if (session == null) {
            return [];
          }

          return source_urls_from_session(
            session,
            backend_base_url,
            route,
            payload.blueprints,
          );
        } catch (error) {
          console.warn(`Failed to fetch DOHC sessions: ${error}`);
          return [];
        }
      }

      function source_urls_from_session(
        session,
        backend_base_url,
        route,
        blueprints,
      ) {
        let source_urls = Array.isArray(session.source_urls)
          ? session.source_urls
          : [];
        const blueprint_url =
          session.blueprint_url ||
          (blueprints != null ? blueprints[route] : null);
        if (source_urls.length === 0) {
          source_urls = [session.recording_url, blueprint_url].filter(
            Boolean,
          );
        } else if (
          blueprint_url != null &&
          blueprint_url !== "" &&
          !source_urls.includes(blueprint_url)
        ) {
          source_urls = [...source_urls, blueprint_url];
        }

        return source_urls.map((source_url) =>
          with_session_hint(
            new URL(source_url, backend_base_url),
            session.id || "default",
            route,
          ),
        );
      }

      function dohc_fallback_source_urls(backend_base_url, route) {
        return [
          with_session_hint(
            new URL("/recordings/dohc_smoke.rrd", backend_base_url),
            "demo-session-1",
            route,
          ),
          with_session_hint(
            new URL(`/blueprints/${route}.rbl`, backend_base_url),
            "demo-session-1",
            route,
          ),
        ];
      }

      function with_session_hint(url, session_id, route) {
        if (!url.searchParams.has("session")) {
          url.searchParams.set("session", session_id);
        }
        if (!url.searchParams.has("route")) {
          url.searchParams.set("route", route);
        }
        return url.toString();
      }

      function on_app_started(handle) {
        // Call `handle.destroy()` to stop. Uncomment to quick result:
        // setTimeout(() => { handle.destroy(); handle.free()) }, 2000)

        console.debug("App started.");
        hide_center_html();
        show_canvas();

        if (window.location !== window.parent.location) {
          window.parent.postMessage("READY", "*");
        }

        window._handle = handle;
      }

      function on_wasm_error(error) {
        console.error("Failed to start: " + error);

        hide_canvas();
        show_center_html(`
          <p>
              An error occurred during loading:
          </p>
          <p style="font-family:Courier New">
              ${error}
          </p>
          <p>
              Reload the page to try again.<br>
              Please consider filing a <a href=https://github.com/rerun-io/rerun/issues/new/>bug report<a>. Thank you!
          </p>
          ${forceWgpuBackendInfoParagraph}
        `);
      }
    </script>
  </body>
</html>
